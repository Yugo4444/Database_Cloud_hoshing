version: "3.9"

services:
  db:
    image: postgres:15
    container_name: cloud_hosting_db
    restart: always
    env_file:
      - .env
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker-initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: cloud_hosting_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./api:/app/api
    command: >
      sh -c "uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  postgres_data:
